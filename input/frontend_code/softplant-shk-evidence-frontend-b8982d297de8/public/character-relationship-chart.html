const nodeFilterTypes = [
    { value: 'all', label: '모든 노드' },
    { value: '피의자', label: '피의자' },
    { value: '피해자', label: '피해자' },
    { value: '사망자', label: '사망자' },
    { value: '참고인/관계자', label: '참고인/관계자' },
    { value: '기관/법인', label: '기관/법인' }
];
const edgeFilterTypes = [
    { value: 'all', label: '모든 관계' },
    { value: '범죄 행위', label: '범죄 행위' },
    { value: '법적 관계', label: '법적 관계' },
    { value: '가족 관계', label: '가족 관계' },
    { value: '사회적 관계', label: '사회적 관계' },
    { value: '소속/고용', label: '소속/고용' },
    { value: '기타 관계', label: '기타 관계' }
];
        const loadingIndicator = document.getElementById('loading-indicator');
        loadingIndicator.style.display = 'block';
        const defaultNodeShape = 'dot';
        const defaultNodeSize = 20;
        const physicsSettings = {
            enabled: true,
            barnesHut: {
                gravitationalConstant: -10000,
                centralGravity: 0.5,
                springLength: 120,
                springConstant: 0.04,
                damping: 0.09,
                avoidOverlap: 0.1
            },
            solver: 'barnesHut',
            stabilization: {
                iterations: 1000,
            }
        };
        const NODE_DIM_OPACITY = 0.15;
        const EDGE_DIM_OPACITY = 0.1;
        const EDGE_HIGHLIGHT_WIDTH_BOOST = 1.4;

        function deepClone(obj) {
            return obj ? JSON.parse(JSON.stringify(obj)) : null;
        }

        function cloneColorValue(colorValue) {
            if (colorValue === undefined || colorValue === null) return null;
            if (typeof colorValue === 'string') return colorValue;
            return deepClone(colorValue);
        }

        function hexToRgb(hex) {
            if (!hex) return { r: 153, g: 153, b: 153 };
            let sanitized = hex.replace('#', '');
            if (sanitized.length === 3) {
                sanitized = sanitized.split('').map(ch => ch + ch).join('');
            }
            const intVal = parseInt(sanitized, 16);
            return {
                r: (intVal >> 16) & 255,
                g: (intVal >> 8) & 255,
                b: intVal & 255,
            };
        }

        function colorStringToRgba(colorStr, alpha) {
            const clampedAlpha = Math.max(0, Math.min(alpha, 1));
            if (!colorStr) return 'rgba(153, 153, 153, ' + clampedAlpha + ')';
            if (clampedAlpha >= 0.99) return colorStr;
            if (colorStr.startsWith('rgba')) {
                const parts = colorStr.replace(/rgba\(|\)/g, '').split(',').map(p => p.trim());
                return 'rgba(' + parts[0] + ', ' + parts[1] + ', ' + parts[2] + ', ' + clampedAlpha + ')';
            }
            if (colorStr.startsWith('rgb')) {
                const parts = colorStr.replace(/rgb\(|\)/g, '').split(',').map(p => p.trim());
                return 'rgba(' + parts[0] + ', ' + parts[1] + ', ' + parts[2] + ', ' + clampedAlpha + ')';
            }
            if (colorStr.startsWith('#')) {
                const { r, g, b } = hexToRgb(colorStr);
                return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + clampedAlpha + ')';
            }
            return colorStr;
        }

        function applyOpacityToColor(colorValue, alpha) {
            const clampedAlpha = Math.max(0, Math.min(alpha, 1));
            if (colorValue === undefined || colorValue === null) {
                return colorStringToRgba('#9ca3af', clampedAlpha);
            }
            if (clampedAlpha >= 0.99) {
                return cloneColorValue(colorValue);
            }
            if (typeof colorValue === 'string') {
                return colorStringToRgba(colorValue, clampedAlpha);
            }
            const clone = cloneColorValue(colorValue);
            ['color', 'background', 'border'].forEach((key) => {
                if (clone && clone[key]) {
                    clone[key] = colorStringToRgba(clone[key], clampedAlpha);
                }
            });
            ['highlight', 'hover'].forEach((key) => {
                if (!clone || !clone[key]) return;
                if (typeof clone[key] === 'string') {
                    clone[key] = colorStringToRgba(clone[key], clampedAlpha);
                } else {
                    ['color', 'background', 'border'].forEach(subKey => {
                        if (clone[key][subKey]) {
                            clone[key][subKey] = colorStringToRgba(clone[key][subKey], clampedAlpha);
                        }
                    });
                }
            });
            return clone;
        }

        function buildFontObject(baseFont, size, fallbackFont) {
            const source = baseFont ? deepClone(baseFont) : deepClone(fallbackFont || {});
            if (!source) return { size };
            source.size = size;
            return source;
        }
        const processedNodes = nodesData.map(node => ({
            ...node,
            color: groupColors[node.group] || '#999999',
            shape: groupShapes[node.group] || defaultNodeShape,
            font: { color: '#000000' }
        }));
        const nodes = new vis.DataSet(processedNodes);
        const edges = new vis.DataSet(edgesData);
        const container = document.getElementById('graph-container');
        const originalData = { nodes: nodes, edges: edges };
        const options = {
            nodes: {
                borderWidth: 2,
                size: defaultNodeSize,
                font: { size: 12, face: 'Inter', color: '#333333' },
            },
            edges: {
                width: 2,
                smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 },
                font: { size: 10, align: 'middle', color: '#555', strokeWidth: 3, strokeColor: '#ffffff' }
            },
            physics: physicsSettings,
            interaction: {
                hover: true,
                navigationButtons: false,
                keyboard: true
            },
            layout: {
                randomSeed: 12345,
                improvedLayout:true
            }
        };
        const defaultNodeFont = deepClone(options.nodes && options.nodes.font ? options.nodes.font : { size: 12, color: '#333333' });
        const defaultEdgeFont = deepClone(options.edges && options.edges.font ? options.edges.font : { size: 10, color: '#555555' });
        const defaultEdgeWidth = typeof options.edges.width === 'number' ? options.edges.width : 2;
        const nodeBaseStyles = new Map();
        const edgeBaseStyles = new Map();

        nodes.get().forEach(node => {
            nodeBaseStyles.set(node.id, {
                color: cloneColorValue(node.color || (groupColors[node.group] || '#999999')),
                font: node.font ? deepClone(node.font) : null,
                fontSize: node.font && typeof node.font.size === 'number' ? node.font.size : (defaultNodeFont.size || 12)
            });
        });

        edges.get().forEach(edge => {
            edgeBaseStyles.set(edge.id, {
                color: cloneColorValue(edge.color || null),
                font: edge.font ? deepClone(edge.font) : null,
                fontSize: edge.font && typeof edge.font.size === 'number' ? edge.font.size : (defaultEdgeFont.size || 10),
                width: typeof edge.width === 'number' ? edge.width : defaultEdgeWidth
            });
        });

        let currentFocusedNodeId = null;
        let network = new vis.Network(container, originalData, options);

        function updateNodesForFocus(relatedNodeIds) {
            const updates = [];
            nodeBaseStyles.forEach((style, id) => {
                const isRelated = relatedNodeIds.has(id);
                const targetFont = isRelated ? style.fontSize + 4 : Math.max(10, style.fontSize - 2);
                const update = {
                    id,
                    font: buildFontObject(style.font, targetFont, defaultNodeFont)
                };
                const adjustedColor = applyOpacityToColor(style.color, isRelated ? 1 : NODE_DIM_OPACITY);
                if (adjustedColor) {
                    update.color = adjustedColor;
                }
                updates.push(update);
            });
            nodes.update(updates);
        }

        function updateEdgesForFocus(relatedEdgeIds) {
            const updates = [];
            edgeBaseStyles.forEach((style, id) => {
                const isRelated = relatedEdgeIds.has(id);
                const targetFont = isRelated ? style.fontSize + 2 : Math.max(8, style.fontSize - 1);
                const update = {
                    id,
                    width: isRelated ? Math.max(style.width * EDGE_HIGHLIGHT_WIDTH_BOOST, style.width + 1) : Math.max(1, style.width * 0.6),
                    font: buildFontObject(style.font, targetFont, defaultEdgeFont)
                };
                const adjustedColor = applyOpacityToColor(style.color, isRelated ? 1 : EDGE_DIM_OPACITY);
                if (adjustedColor) {
                    update.color = adjustedColor;
                }
                updates.push(update);
            });
            edges.update(updates);
        }

        function applyVisualFocus(nodeId) {
            if (!nodeId || currentFocusedNodeId === nodeId) return;
            currentFocusedNodeId = nodeId;
            const relatedNodeIds = new Set(network.getConnectedNodes(nodeId));
            relatedNodeIds.add(nodeId);
            const relatedEdgeIds = new Set(network.getConnectedEdges(nodeId));
            updateNodesForFocus(relatedNodeIds);
            updateEdgesForFocus(relatedEdgeIds);
        }

        function resetVisualFocus(force = false) {
            if (!force && currentFocusedNodeId === null) return;
            currentFocusedNodeId = null;
            const nodeUpdates = [];
            nodeBaseStyles.forEach((style, id) => {
                const update = {
                    id,
                    font: buildFontObject(style.font, style.fontSize, defaultNodeFont)
                };
                if (style.color) {
                    update.color = cloneColorValue(style.color);
                }
                nodeUpdates.push(update);
            });
            const edgeUpdates = [];
            edgeBaseStyles.forEach((style, id) => {
                const update = {
                    id,
                    width: style.width,
                    font: buildFontObject(style.font, style.fontSize, defaultEdgeFont)
                };
                if (style.color) {
                    update.color = cloneColorValue(style.color);
                }
                edgeUpdates.push(update);
            });
            nodes.update(nodeUpdates);
            edges.update(edgeUpdates);
        }

        // Store initial positions after stabilization
        let initialPositions = {};
        network.once("stabilizationIterationsDone", () => {
            loadingIndicator.style.display = 'none';
            network.setOptions( { physics: false } );
            
            // Store initial positions after stabilization
            console.log("init position - captured once")
            initialPositions = network.getPositions();
        });
        
        // --- Metadata Display Logic ---
        const metadataDisplay = document.getElementById('metadata-display');
        network.on('click', function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const nodeData = originalData.nodes.get(nodeId);
                if (nodeData && nodeData.metadata) {
                    metadataDisplay.innerHTML = nodeData.metadata;
                } else {
                    metadataDisplay.innerHTML = '<p class="text-gray-500">선택된 노드에 제목 정보가 없습니다.</p>';
                }
                applyVisualFocus(nodeId);
            } else {
                // Clear metadata if a node is not clicked
                metadataDisplay.innerHTML = '<p class="text-gray-500">정보를 보려면 노드를 클릭하세요.</p>';
                resetVisualFocus();
            }
        });
        // --- Filter Logic ---
        const searchInput = document.getElementById('search-input');
        const nodeTypeFilterContainer = document.getElementById('node-type-filter-options');
        const edgeTypeFilterContainer = document.getElementById('edge-type-filter-options');
        const resetButton = document.getElementById('reset-button');
        function populateFilters(container, filters, name) {
            container.innerHTML = '';
            filters.forEach(filter => {
                const label = document.createElement('label');
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.value = filter.value;
                input.name = name;
                input.className = 'hidden peer';
                if (filter.value === 'all') {
                    input.checked = true;
                }
                const span = document.createElement('span');
                span.className = 'inline-block px-3 py-1.5 border border-gray-300 rounded-md cursor-pointer text-sm text-gray-600 transition-colors duration-200 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600';
                span.textContent = filter.label;
                label.appendChild(input);
                label.appendChild(span);
                container.appendChild(label);
            });
        }
        populateFilters(nodeTypeFilterContainer, nodeFilterTypes, 'nodeType');
        populateFilters(edgeTypeFilterContainer, edgeFilterTypes, 'edgeType');
        searchInput.addEventListener('keyup', e => {
            const searchText = e.target.value.toLowerCase();
            if (searchText.length > 0) {
                const matchedNodes = originalData.nodes.get({ filter: node => node.label.toLowerCase().includes(searchText) });
                if (matchedNodes.length > 0) {
                    network.focus(matchedNodes[0].id, { scale: 1.5, animation: true });
                    network.selectNodes([matchedNodes[0].id]);
                    applyVisualFocus(matchedNodes[0].id);
                } else { 
                    network.unselectAll();
                    resetVisualFocus(true);
                }
            } else {
                network.fit({ animation: true });
                network.unselectAll();
                resetVisualFocus(true);
            }
        });
        function getSelectedCheckboxValues(container) {
            const checkboxes = container.querySelectorAll('input[type="checkbox"]');
            const selectedValues = [];
            let allChecked = false;
            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    if (checkbox.value === 'all') allChecked = true;
                    else selectedValues.push(checkbox.value);
                }
            });
            if (allChecked || (selectedValues.length === 0 && container.querySelector('input[value="all"]').checked)) {
                const allOptions = [];
                container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    if (cb.value !== 'all') allOptions.push(cb.value);
                });
                return allOptions;
            }
            return selectedValues;
        }
        function manageCheckboxGroup(container) {
            const allCheckbox = container.querySelector('input[value="all"]');
            const individualCheckboxes = Array.from(container.querySelectorAll('input[type="checkbox"]:not([value="all"])'));
            allCheckbox.addEventListener('change', () => {
                if (allCheckbox.checked) {
                    individualCheckboxes.forEach(cb => cb.checked = false);
                }
                applyFilters();
            });
            individualCheckboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.checked) {
                        allCheckbox.checked = false;
                    } else if (individualCheckboxes.every(iCb => !iCb.checked)) {
                        allCheckbox.checked = true;
                    }
                    applyFilters();
                });
            });
        }
        manageCheckboxGroup(nodeTypeFilterContainer);
        manageCheckboxGroup(edgeTypeFilterContainer);
        
        function isResetOrSelectAllScenario() {
            const allNodeCheckbox = nodeTypeFilterContainer.querySelector('input[value="all"]');
            const allEdgeCheckbox = edgeTypeFilterContainer.querySelector('input[value="all"]');
            console.log(allNodeCheckbox.checked, allEdgeCheckbox.checked)
            return allNodeCheckbox.checked && allEdgeCheckbox.checked;
        }
        
        function applyFilters() {
            const selectedNodeTypes = getSelectedCheckboxValues(nodeTypeFilterContainer);
            const selectedEdgeTypes = getSelectedCheckboxValues(edgeTypeFilterContainer);

            // Check if all nodes or all edges are selected
            const allNodesSelected = selectedNodeTypes.length === nodeFilterTypes.length - 1;
            const allEdgesSelected = selectedEdgeTypes.length === edgeFilterTypes.length - 1;

            let nodesView, edgesView;

            if (allNodesSelected && !allEdgesSelected) {
                console.log("edge filtering")
                // Edge filtering only: show selected edges and their connected nodes
                edgesView = new vis.DataView(originalData.edges, {
                    filter: edge => selectedEdgeTypes.includes(edge.type)
                });

                // Get the filtered edges to find connected nodes
                const visibleEdges = edgesView.get();
                const connectedNodeIds = new Set();
                visibleEdges.forEach(edge => {
                    connectedNodeIds.add(edge.from);
                    connectedNodeIds.add(edge.to);
                });

                nodesView = new vis.DataView(originalData.nodes, {
                    filter: node => connectedNodeIds.has(node.id)
                });

            } else if (!allNodesSelected && allEdgesSelected) {
                console.log("node filtering")
                // Node filtering only: show selected nodes and all edges between them
                nodesView = new vis.DataView(originalData.nodes, {
                    filter: node => selectedNodeTypes.includes(node.typeName)
                });

                edgesView = new vis.DataView(originalData.edges, {
                    filter: edge => {
                        const fromNodeVisible = nodesView.get(edge.from) !== null;
                        const toNodeVisible = nodesView.get(edge.to) !== null;
                        return fromNodeVisible && toNodeVisible;
                    }
                });

            } else if(!allNodesSelected && !allEdgesSelected) {
                console.log("both filtering")
                edgesView = new vis.DataView(originalData.edges, {
                    filter: edge => selectedEdgeTypes.includes(edge.type)
                });
                const visibleEdges = edgesView.get();
                const connectedNodeIds = new Set();
                visibleEdges.forEach(edge => {
                    connectedNodeIds.add(edge.from);
                    connectedNodeIds.add(edge.to);
                });

                nodesView = new vis.DataView(originalData.nodes, {
                    filter: node => connectedNodeIds.has(node.id) && selectedNodeTypes.includes(node.typeName)
                });
                
            } else {
                console.log("no filtering - showing all nodes and edges")
                // Show all nodes and edges without any filtering
                nodesView = new vis.DataView(originalData.nodes);
                edgesView = new vis.DataView(originalData.edges);
            }

            // Set data first
            network.setData({ nodes: nodesView, edges: edgesView });
            
            // Check if this is a reset or select all scenario
            if (isResetOrSelectAllScenario()) {
                // Apply initial positions for reset/select all
                const nodeIds = nodesView.getIds();
                nodeIds.forEach(nodeId => {
                    if (initialPositions[nodeId]) {
                        network.moveNode(nodeId, initialPositions[nodeId].x, initialPositions[nodeId].y);
                    }
                });
                // Keep physics disabled to maintain positions
                network.setOptions({ physics: { enabled: false } });
                // Fit view to show all nodes
                network.fit();
            } else {
                // For other filters, use physics for better layout
                network.setOptions({
                    physics: physicsSettings,
                });

                // Disable physics after stabilization and fit view
                network.once('stabilizationIterationsDone', function() {
                    network.setOptions({ physics: { enabled: false } });
                    // Fit view to show all filtered nodes
                    network.fit();
                });

                // Start stabilization
                network.stabilize();
            }
        }
        resetButton.addEventListener('click', () => {
            searchInput.value = '';
            document.querySelectorAll('#node-type-filter-options input[type="checkbox"], #edge-type-filter-options input[type="checkbox"]').forEach(cb => {
                const isAllButton = cb.value === 'all';
                cb.checked = isAllButton;
            });
            network.unselectAll();
            resetVisualFocus(true);
            applyFilters();
        });
        window.addEventListener('resize', () => {
            network.redraw();
            network.fit();
        });
    </script>
